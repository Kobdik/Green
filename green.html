<!DOCTYPE html>
<html>
<style>
  input:invalid {
  border: red solid 3px;
}
</style>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>GreenAPI client</title>
	<link rel="stylesheet" href="./css/bootstrap.min.css" />
	<script type="module" src="./js/green.js"></script>
</head>
<body>
    <header>
        <h2 class="text-start mx-4">GreenAPI calls</h2>
    </header>
    <div class="container-fluid">
        <div class="row">
            <div class="col-5">
                <div class="input-group mb-3">
                    <span class="input-group-text">idInstance</span>
                    <input type="text" id="idNumber" pattern="[0-9]+" required class="form-control" aria-label="idInstance" placeholder="enter instance number">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">apiTokenInstance</span>
                    <input type="text" id="apiToken" pattern="[a-z0-9]+" required class="form-control" aria-label="apiTokenInstance" placeholder="enter api token">
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary get" id="getSettings" type="button">getSettings</button>
                    <button class="btn btn-primary get" id="getStateInstance" type="button">getStateInstance</button>
                </div>
                <hr/>
                <div class="input-group mb-3">
                    <span class="input-group-text">chatId</span>
                    <input type="text" id="chatId1" pattern="[0-9]+" required class="form-control" placeholder="enter chat id">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">message</span>
                    <textarea class="form-control" id="message" required rows="2"></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary post" id="sendMessage" type="button">sendMessage</button>
                </div>
                <hr/>
                <div class="input-group mb-3">
                    <span class="input-group-text">chatId</span>
                    <input type="text" id="chatId2" pattern="[0-9]+" required class="form-control" placeholder="enter chat id">
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text">File by URL</span>
                    <input type="text" id="urlFile" required class="form-control" placeholder="enter file URL">
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary post" id="sendFileByUrl" type="button">sendFileByUrl</button>
                </div>
            </div>
            <div class="col-7">
                <div class="input-group">
                    <span class="input-group-text">Result:</span>
                    <textarea class="form-control" id="result" readonly rows="16"></textarea>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
